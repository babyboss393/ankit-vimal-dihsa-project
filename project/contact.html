    <link rel="stylesheet" href="../project/CSS/contact.css">
</head>

<body>
  <nav>
    <div class="logo">KICK-VERSE</div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="Signup.html">Signup / Login</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="Aboutus.html">About</a></li>
    </ul>
  </nav>
  <section class="contact-section">
    <div class="contact-text">
      <h1>CONTACT <span>US</span></h1>

      <p>
        Have questions about sneakers, orders, or collaborations?
        Our KICK-VERSE team is here to help you anytime.
      </p>

      <div class="info">
        <p>📍 India</p>
        <p>📞 +91 98765 43210</p>
        <p>📧 support@kickverse.com</p>
      </div>
    </div>
    <div class="contact-form">

      <h2>Send Message</h2>

      <form>

        <div class="input-box">
          <input type="text" placeholder="Your Name" required>
        </div>

        <div class="input-box">
          <input type="email" placeholder="Your Email" required>
        </div>

        <div class="input-box">
          <input type="text" placeholder="Subject">
        </div>

        <div class="input-box">
          <textarea placeholder="Write your message..."></textarea>
        </div>

        <button type="submit" class="btn">Send Message</button>

      </form>
    </div>

  </section>

</body>
</html>
